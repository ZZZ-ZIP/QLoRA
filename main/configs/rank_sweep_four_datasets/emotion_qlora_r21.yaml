project_name: qwen3vl_2b_emotion_qlora_four_datasets_r21
seed: 42
model:
  base_model: ../models/Qwen3-VL-2B-Instruct
  local_files_only: true
  trust_remote_code: true
  max_pixels: 401408
task:
  labels:
  - positive
  - negative
  - neutral
  label_aliases:
    pos: positive
    positive_sentiment: positive
    neg: negative
    negative_sentiment: negative
    neu: neutral
    neutral_state: neutral
  system_prompt: You are a multimodal emotion recognition model. Use the provided
    video frames and transcript to identify the emotion conveyed by the speaker. Choose
    exactly one label from the allowed set.
  user_prompt_template: 'The person in the video says: {transcript} Determine the
    emotion conveyed. Allowed labels: {labels}. Return exactly one JSON object in
    this format: {{"emotion":"<label>"}}.'
data:
  output_dir: data_four_datasets
  image_column: image_path
  frame_paths_column: frame_paths
  transcript_column: transcript
  label_column: label
  id_column: sample_id
  split_column: split
  subject_column: subject_id
  val_ratio: 0.1
  test_ratio: 0.1
training:
  output_dir: runs/rank_sweep_four_datasets/qwen3vl_2b_emotion_qlora_four_datasets_r21
  num_train_epochs: 3
  learning_rate: 0.0001
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_steps: 300
  eval_steps: 300
  save_total_limit: 3
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  report_to: none
  remove_unused_columns: false
qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
  lora_r: 21
  lora_alpha: 42
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 0.0
